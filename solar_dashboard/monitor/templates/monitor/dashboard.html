<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Smart Solar Farm Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 20px; background-color: #f4f7f6; color: #333; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); display: inline-block; min-width: 150px; margin-right: 15px; text-align: center; }
        .card b { font-size: 1.5em; color: #2c3e50; }
        .card-label { display: block; font-size: 0.8em; color: #7f8c8d; text-transform: uppercase; margin-bottom: 5px; }
        .charts-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-top: 30px; }
        .chart-wrapper { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); min-height: 250px; }
        table { border-collapse: collapse; width: 100%; margin-top: 30px; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        th, td { padding: 15px; text-align: center; border-bottom: 1px solid #eee; }
        th { background-color: #2c3e50; color: white; }
        .alert-row { background-color: #fff1f0 !important; color: #cf1322; font-weight: 500; }
        .alert-box { margin: 20px 0; padding: 15px; border-radius: 8px; display: inline-block; font-weight: bold; }
    </style>
</head>
<body>

    <header>
        <h1>Smart Solar Farm Monitoring</h1>
        <p>Resource: <strong>DynamoDB (Global-Tier Storage)</strong></p>
    </header>

    <div class="card"><span class="card-label">Voltage</span><b id="voltage">0</b> V</div>
    <div class="card"><span class="card-label">Power Output</span><b id="power">0</b> W</div>
    <div class="card"><span class="card-label">Temperature</span><b id="temperature">0</b> °C</div>

    <div id="alert-container" class="alert-box"><span id="alert">SYSTEM NORMAL</span></div>

    <div class="charts-container">
        <div class="chart-wrapper"><canvas id="voltageChart"></canvas></div>
        <div class="chart-wrapper"><canvas id="powerChart"></canvas></div>
        <div class="chart-wrapper"><canvas id="tempChart"></canvas></div>
    </div>

    <h2>Scalable Telemetry Logs (Cloud-Synced)</h2>
    <table id="recent-readings">
        <thead>
            <tr><th>Voltage</th><th>Power</th><th>Temperature</th><th>Time (UTC)</th></tr>
        </thead>
        <tbody></tbody>
    </table>

    <script>
        const chartOptions = (label, color) => ({
            type: 'line',
            data: {
                labels: [],
                datasets: [{
                    label: label, data: [], borderColor: color, borderWidth: 2,
                    backgroundColor: 'transparent', pointBackgroundColor: [], 
                    pointRadius: [], pointHoverRadius: 7, fill: false, tension: 0.2
                }]
            },
            options: { responsive: true, maintainAspectRatio: false, animation: false, scales: { y: { beginAtZero: false } } }
        });

        const vChart = new Chart(document.getElementById('voltageChart'), chartOptions('Voltage (V)', '#1976d2'));
        const pChart = new Chart(document.getElementById('powerChart'), chartOptions('Power (W)', '#2e7d32'));
        const tChart = new Chart(document.getElementById('tempChart'), chartOptions('Temp (°C)', '#f57c00'));

        function updateDashboard(){
            fetch('/api/latest/').then(res => res.json()).then(data => {
                document.getElementById('voltage').innerText = data.voltage;
                document.getElementById('power').innerText = data.power_watt;
                document.getElementById('temperature').innerText = data.temperature;
                const container = document.getElementById('alert-container');
                const text = document.getElementById('alert');
                container.style.backgroundColor = data.local_alert ? '#ffebee' : '#e8f5e9';
                container.style.color = data.local_alert ? '#c62828' : '#2e7d32';
                text.innerText = data.local_alert ? 'ANOMALY DETECTED' : 'SYSTEM NORMAL';
            });

            fetch('/api/recent/').then(res => res.json()).then(readings => {
                const chartReadings = [...readings].sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));
                const labels = [], vData = [], pData = [], tData = [];
                const vColors = [], pColors = [], tColors = [], vRadii = [], pRadii = [], tRadii = [];

                chartReadings.forEach(r => {
                    const timeLabel = r.timestamp.includes('T') ? r.timestamp.split('T')[1].substring(0, 8) : r.timestamp;
                    labels.push(timeLabel);
                    const vol = parseFloat(r.voltage), pwr = parseFloat(r.power_watt), tmp = parseFloat(r.temperature);
                    const light = parseFloat(r.light_intensity || 0);

                    vData.push(vol); pData.push(pwr); tData.push(tmp);

                    // --- REVISED LOGIC ---
                    // Temp Graph: Red dot if Temp is actually high
                    if (tmp > 75) { tColors.push('#cf1322'); tRadii.push(6); } 
                    else { tColors.push('transparent'); tRadii.push(0); }

                    // Power Graph: Red dot if it matches the 'Low Power but High Light' rule
                    if (pwr < 50 && light > 800) { pColors.push('#cf1322'); pRadii.push(6); } 
                    else { pColors.push('transparent'); pRadii.push(0); }

                    // Voltage Graph: Stays clean as there is no specific rule for it yet
                    vColors.push('transparent'); vRadii.push(0);
                });

                const tableBody = document.querySelector('#recent-readings tbody');
                tableBody.innerHTML = ''; 
                readings.forEach(r => {
                    const row = tableBody.insertRow(-1);
                    if (r.local_alert) row.classList.add('alert-row');
                    row.insertCell(0).innerText = r.voltage + "V";
                    row.insertCell(1).innerText = r.power_watt + "W";
                    row.insertCell(2).innerText = r.temperature + "°C";
                    row.insertCell(3).innerText = r.timestamp;
                });

                const updateChart = (chart, data, colors, radii) => {
                    chart.data.labels = labels;
                    chart.data.datasets[0].data = data;
                    chart.data.datasets[0].pointBackgroundColor = colors;
                    chart.data.datasets[0].pointRadius = radii;
                    chart.update('none');
                };
                updateChart(vChart, vData, vColors, vRadii);
                updateChart(pChart, pData, pColors, pRadii);
                updateChart(tChart, tData, tColors, tRadii);
            });
        }
        setInterval(updateDashboard, 5000);
        updateDashboard();
    </script>
</body>
</html>
