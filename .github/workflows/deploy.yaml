name: Deploy Solar Dashboard to Elastic Beanstalk

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          cd solar_dashboard
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate Deployment Package
        cp solar_dashboard/requirements.txt .
        run: zip -r deploy_package.zip . -x "*.git*" # Package everything except git history

      - name: Deploy to Elastic Beanstalk
        uses: einaregilsson/beanstalk-deploy@v22
        with:
          aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          application_name: "solar_dashboard"
          environment_name: "smart-env "
          version_label: "solar-app-${{ github.sha }}"
          region: "us-east-1"
          deployment_package: deploy_package.zip